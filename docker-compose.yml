version: '3.8'
services:
  internetbanking:
    image: 156321000/ib-image:latest
    ports:
      - "85:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/internetbanking
  mobilebanking:
    image: 156321000/mb-image:latest
    ports:
      - "86:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/mobilebanking
  insurance:
    image: 156321000/insurance-image:latest
    ports:
      - "87:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/insurance
  loan:
    image: 156321000/loans-image:latest
    ports:
      - "88:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/loan
